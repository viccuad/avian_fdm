[package]
name = "avian_fdm"
version = "0.1.0"
edition = "2021"
description = "6-DoF Flight Dynamics Model for Bevy + Avian 0.6"
license = "LGPL-2.1-or-later"
exclude = ["/assets/", "/docs/", "/.github/"]

[features]
# `avian3d/f32` and `avian3d/parry-f32` are NOT listed here by default.
# They are pulled in transitively when `presets` is enabled (via `avian3d/default-collider`).
# Users who write their own aircraft without presets must enable precision on their
# avian3d dependency directly. To switch to f64, add avian_fdm with
# `default-features = false` and enable `avian3d/f64` + `avian3d/parry-f64`.
debug-plugin = ["dep:bevy_color", "dep:bevy_gizmos", "avian3d/f32", "avian3d/parry-f32"]
# presets enables default-collider which transitively enables parry-f32.
presets = ["avian3d/default-collider", "avian3d/f32", "avian3d/parry-f32"]

[dependencies]
# collider-from-mesh is excluded: avian_fdm uses only analytic shapes (boxes, spheres,
# capsules) for AeroZone colliders. Mesh-based colliders would require AssetPlugin +
# MeshPlugin in headless apps, and are never needed for a flight dynamics library.
avian3d = { version = "0.6", default-features = false, features = [
    "3d",
] }
bevy_app     = { version = "0.18", default-features = false }
bevy_ecs     = { version = "0.18", default-features = false }
bevy_math    = { version = "0.18", default-features = false }
bevy_transform = { version = "0.18", default-features = false }
bevy_reflect = { version = "0.18", default-features = false }
bevy_color   = { version = "0.18", default-features = false, optional = true }
bevy_gizmos  = { version = "0.18", default-features = false, optional = true }
bevy_log     = { version = "0.18", default-features = false }
serde = { version = "1", features = ["derive"] }

[dev-dependencies]
bevy = { version = "0.18", features = [
    "bevy_winit",
    "bevy_pbr",
    "bevy_gizmos",
] }

[[test]]
name = "perf_limits"
required-features = ["presets"]

[[example]]
name = "j3cub_minimal"
required-features = ["presets"]

[[example]]
name = "j3cub_visual"
required-features = ["presets", "debug-plugin"]
