[package]
name = "avian_fdm"
version = "0.1.0"
edition = "2021"
description = "6-DoF Flight Dynamics Model for Bevy + Avian 0.6"
license = "MIT OR Apache-2.0"

[features]
default = ["damage", "propulsion"]
damage = []
propulsion = []
debug-viz = ["dep:bevy_egui"]
presets = []

[dependencies]
# collider-from-mesh is excluded: avian_fdm uses only analytic shapes (boxes, spheres,
# capsules) for AeroZone colliders. Mesh-based colliders would require AssetPlugin +
# MeshPlugin in headless apps, and are never needed for a flight dynamics library.
avian3d = { version = "0.6", default-features = false, features = [
    "3d", "f32", "parry-f32", "default-collider", "xpbd_joints", "parallel",
] }
bevy = { version = "0.18", default-features = false, features = ["bevy_scene", "bevy_asset", "bevy_render"] }
serde = { version = "1", features = ["derive"] }

# Optional — only with debug-viz feature
bevy_egui = { version = "0.39", optional = true }

[dev-dependencies]
bevy = { version = "0.18", features = ["bevy_winit", "bevy_pbr", "bevy_gizmos"] }
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "fdm_hot_path"
harness = false

[[example]]
name = "j3cub_minimal"
required-features = ["presets"]

[[example]]
name = "j3cub_visual"
required-features = ["presets"]
